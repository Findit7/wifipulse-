name: wifi_pulse
description: "A modern Android-first Wi-Fi monitoring and management application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  dio: ^5.4.2
  logger: ^2.0.2
  fpdart: ^1.1.0
  google_fonts: ^6.2.1
  riverpod_annotation: ^2.3.5
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^5.0.2
  network_info_plus: ^4.1.0
  permission_handler: ^12.0.1  
  flutter_local_notifications: ^17.0.0
  workmanager: ^0.5.2
  firebase_auth: ^4.17.4
  uuid: ^4.3.3
  drift: ^2.19.1+1
  sqlite3_flutter_libs: ^0.6.0+eol
  ping_discover_network_plus: ^0.0.5
  freezed_annotation: ^2.4.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11
  drift_dev: ^2.19.1

flutter:
  uses-material-design: true
